mutation CreateIssue(
  $title: String!,
  $description: String!,
  $teamId: String!,
  $projectId: String,
  $assigneeId: String,
  $parentId: String
) {
  issueCreate(input: {
    title: $title,
    description: $description,
    assigneeId: $assigneeId,
    teamId: $teamId,
    parentId: $parentId,
    projectId: $projectId
  }) {
    success
    issue {
      id
      title
      identifier
      url
      assignee {
        id
        displayName
      }
    }
  }
}

query IssueByIdentifier($id: String!) {
  issue(id: $id) {
    id
    identifier
    title
    description
    url
    createdAt
    state {
      id
      name
    }
    assignee {
      id
      name
      email
    }
    team {
      id
      name
      key
    }
    project {
      name
    }
    parent {
      identifier
      title
    }
  }
}
